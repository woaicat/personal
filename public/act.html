<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>行动计划表 - 可编辑</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #333333;
      --muted: #e9e9e9;
      --line: #111111;
      --tool: #f6f6f6;
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #191919;
      font-family: "Songti SC", "STSong", "SimSun", serif;
      line-height: 1.55;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(25, 25, 25, 0.92);
      backdrop-filter: blur(6px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .toolbar button {
      min-width: 76px;
      height: 34px;
      padding: 0 14px;
      border: 1px solid #d7d7d7;
      border-radius: 6px;
      color: #222222;
      background: var(--tool);
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button.primary {
      border-color: var(--accent);
      color: #ffffff;
      background: var(--accent);
    }

    .toolbar button:hover {
      filter: brightness(0.96);
    }

    .status {
      min-width: 108px;
      color: #d8d8d8;
      font-size: 13px;
    }

    .page-wrap {
      padding: 24px 18px 40px;
    }

    .sheet {
      width: min(1052px, 100%);
      margin: 0 auto;
      padding: 6px 10px 18px;
      background: var(--paper);
      border-top: 4px solid var(--line);
      border-bottom: 4px solid var(--line);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.32);
    }

    .row {
      display: grid;
      grid-template-columns: 136px minmax(0, 1fr);
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
    }

    .row:first-child {
      margin-top: 4px;
    }

    .label,
    .question,
    .hint,
    .footer-note {
      font-size: clamp(20px, 2.5vw, 26px);
      letter-spacing: 0;
    }

    .label {
      padding-left: 0;
      white-space: nowrap;
    }

    .question {
      margin: 42px 0 22px;
    }

    .hint {
      margin: 34px 0 24px;
    }

    .footer-note {
      margin-top: 6px;
    }

    .editable {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid transparent;
      outline: none;
      background: var(--muted);
      color: #222222;
      font-size: clamp(20px, 2.3vw, 24px);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      transition: border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    .editable:empty::before {
      content: attr(data-placeholder);
      color: #9a9a9a;
    }

    .editable:focus {
      border-color: rgba(59, 130, 246, 0.75);
      background: #f1f6ff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }

    .area-large {
      min-height: 174px;
    }

    .area-medium {
      min-height: 174px;
    }

    .area-small {
      width: min(333px, 100%);
      min-height: 86px;
    }

    @media (max-width: 680px) {
      .toolbar {
        flex-wrap: wrap;
      }

      .status {
        width: 100%;
        text-align: center;
      }

      .page-wrap {
        padding: 12px 8px 28px;
      }

      .sheet {
        padding: 6px 8px 14px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 22px;
      }

      .label {
        white-space: normal;
      }

      .question,
      .hint {
        margin: 32px 0 16px;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .toolbar {
        display: none;
      }

      .page-wrap {
        padding: 0;
      }

      .sheet {
        width: 100%;
        box-shadow: none;
      }

      .editable {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar" aria-label="编辑工具">
    <button class="primary" type="button" id="saveBtn">保存</button>
    <button type="button" id="clearBtn">清空</button>
    <button type="button" id="printBtn">打印</button>
    <span class="status" id="status">未保存</span>
  </div>

  <main class="page-wrap">
    <section class="sheet" aria-label="行动计划表">
      <div class="row">
        <div class="label">生活领域:</div>
        <div class="editable" contenteditable="true" data-field="lifeArea" data-placeholder="点击输入"></div>
      </div>

      <div class="row">
        <div class="label">价值:</div>
        <div class="editable" contenteditable="true" data-field="value" data-placeholder="点击输入"></div>
      </div>

      <div class="row">
        <div class="label">目标:</div>
        <div class="editable" contenteditable="true" data-field="goal" data-placeholder="点击输入"></div>
      </div>

      <p class="question">行动的时间地点，以及我要采取的具体行动有哪些?</p>
      <div class="editable area-large" contenteditable="true" data-field="actions" data-placeholder="点击输入"></div>

      <p class="question">我觉得会出现哪些困难的想法和感觉?</p>
      <div class="editable area-medium" contenteditable="true" data-field="difficulties" data-placeholder="点击输入"></div>

      <p class="question">我是否愿意针对这些困难的想法和感觉使用脱钩技能，并且投身真正有助于实现理想生活的行动，“是”还是“不是”?</p>
      <div class="editable area-small" contenteditable="true" data-field="willingness" data-placeholder="点击输入"></div>

      <p class="hint">(如果不是，更改目标，选择更小、更简单和更容易的目标。)</p>

      <p class="question">用 1 ～ 10 评分，我采取行动的现实可能性是多少分?</p>
      <div class="editable area-small" contenteditable="true" data-field="score" data-placeholder="点击输入"></div>

      <p class="hint">(如果分数小于 7，更改目标，选择更小、更简单和更容易的目标。)</p>
      <p class="footer-note">在继续阅读之前，现在就完成这个表格。</p>
    </section>
  </main>

  <script>
    const storageKey = "editable-action-plan-v1";
    const fields = Array.from(document.querySelectorAll("[data-field]"));
    const status = document.getElementById("status");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const printBtn = document.getElementById("printBtn");
    let saveTimer;

    function getCurrentData() {
      return fields.reduce((data, field) => {
        data[field.dataset.field] = field.innerText;
        return data;
      }, {});
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(getCurrentData()));
      setStatus("已保存");
    }

    function scheduleSave() {
      setStatus("编辑中...");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveData, 500);
    }

    function restoreData() {
      const raw = localStorage.getItem(storageKey);
      if (!raw) {
        setStatus("未保存");
        return;
      }

      try {
        const saved = JSON.parse(raw);
        fields.forEach((field) => {
          field.innerText = saved[field.dataset.field] || "";
        });
        setStatus("已载入");
      } catch (error) {
        setStatus("载入失败");
      }
    }

    fields.forEach((field) => {
      field.addEventListener("input", scheduleSave);
      field.addEventListener("paste", (event) => {
        event.preventDefault();
        const text = event.clipboardData.getData("text/plain");
        document.execCommand("insertText", false, text);
      });
    });

    saveBtn.addEventListener("click", saveData);

    clearBtn.addEventListener("click", () => {
      const confirmed = window.confirm("确定清空当前表格内容吗？浏览器里保存的内容也会删除。");
      if (!confirmed) return;
      fields.forEach((field) => {
        field.innerText = "";
      });
      localStorage.removeItem(storageKey);
      setStatus("已清空");
    });

    printBtn.addEventListener("click", () => window.print());

    restoreData();
  </script>
</body>
</html>
